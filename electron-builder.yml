# Configuration electron-builder — packaging Windows 11 (NSIS)
appId: com.aether.browser
productName: Aether
directories:
  output: release
  buildResources: build
# Mises à jour (electron-updater) : dépôt PUBLIC — l'app distribuée lit les
# releases publiques sans le moindre jeton embarqué. Seule la PUBLICATION
# d'une release (electron-builder --publish always) exige un jeton, sur la
# machine qui publie uniquement — jamais dans le paquet distribué. Voir
# CONTRIBUTING/README pour la procédure de publication d'une version.
publish:
  provider: github
  owner: titilyonnais
  repo: aether-browser
  # Par défaut electron-builder crée une release en BROUILLON (invisible aux
  # requêtes anonymes de l'API — donc invisible à electron-updater côté postes
  # installés, symptôme observé : « no published versions » malgré une
  # publication CI en apparence réussie). Publication immédiate nécessaire
  # puisque rien d'humain ne vient valider un brouillon dans ce flux automatisé.
  releaseType: release
files:
  - out/**/*
  - "!**/*.map"
asarUnpack:
  - "**/*.node"
win:
  target:
    - target: nsis
      arch:
        - x64
  executableName: Aether
  icon: build/icon.ico
nsis:
  # Emplacement d'installation TOUJOURS le même (pas de choix de dossier) — condition
  # nécessaire pour qu'une mise à jour se pose par-dessus l'existant au lieu de créer
  # une installation en double à côté (vécu avec `allowToChangeInstallationDirectory`,
  # qui laissait un dossier différent à chaque installation manuelle).
  oneClick: true
  perMachine: false
  artifactName: ${productName}-Setup-${version}.${ext}
  shortcutName: Aether
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
