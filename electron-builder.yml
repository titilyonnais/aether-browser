# Configuration electron-builder — packaging Windows 11 (NSIS + portable)
appId: com.aether.browser
productName: Aether
copyright: Copyright © 2026 ÆTHER
directories:
  output: release
  buildResources: build
# Mises à jour (electron-updater) : dépôt PUBLIC — l'app distribuée lit les
# releases publiques sans le moindre jeton embarqué. Seule la PUBLICATION
# d'une release (electron-builder --publish always) exige un jeton, sur la
# machine qui publie uniquement — jamais dans le paquet distribué. Voir
# CONTRIBUTING/README pour la procédure de publication d'une version.
publish:
  provider: github
  owner: titilyonnais
  repo: aether-browser
  # Reste en BROUILLON ici volontairement (défaut d'electron-builder) : GitHub
  # refuse de créer directement une release PUBLIÉE pour un tag qui n'existe
  # pas encore (HTTP 422 « Published releases must have a valid tag »),
  # puisque le tag n'est créé qu'AVEC le brouillon. Le workflow CI publie ce
  # brouillon dans une étape séparée juste après (voir .github/workflows/release.yml),
  # une fois le tag réellement créé — sans quoi les releases restent invisibles
  # aux requêtes anonymes (donc à electron-updater), symptôme déjà observé.
  releaseType: draft
files:
  - out/**/*
  - "!**/*.map"
asarUnpack:
  - "**/*.node"
# En l'absence de certificat de signature de code (voir README, section
# « Signature »), un SHA-256 publié à côté des artefacts reste le seul moyen
# offert aux utilisateurs de vérifier l'intégrité d'un téléchargement.
afterAllArtifactBuild: scripts/write-checksums.mjs
win:
  target:
    - target: nsis
      arch:
        - x64
    # Cible « portable » : un seul .exe autonome, aucune installation, aucune
    # écriture registre — s'exécute directement depuis n'importe quel dossier
    # (clé USB, dossier Téléchargements…). Alternative utile tant que
    # SmartScreen bloque l'installeur : ne déclenche PAS le même écran
    # (« application non reconnue » au premier LANCEMENT plutôt qu'à
    # l'installation), mais reste soumis à la même absence de réputation —
    # ce n'est PAS un contournement de SmartScreen, juste un mode de
    # distribution différent, parfois moins intimidant pour un utilisateur.
    - target: portable
      arch:
        - x64
  executableName: Aether
  icon: build/icon.ico
  # Signature Authenticode — AUCUN chemin de certificat ici volontairement :
  # electron-builder détecte automatiquement les variables d'environnement
  # `CSC_LINK` (chemin ou base64 d'un .pfx) et `CSC_KEY_PASSWORD` si elles
  # sont définies au moment du build, sans le moindre réglage YAML. Voir la
  # section « Signature » du README pour la procédure complète (génération du
  # certificat, portée réelle sur SmartScreen). `signtoolOptions` fige
  # l'algorithme sur SHA-256 seul (le défaut signe en SHA-1 ET SHA-256 pour la
  # compatibilité Windows 7/Vista, inutile pour une app qui cible Windows 11) ;
  # l'horodatage RFC 3161 est appliqué automatiquement par electron-builder
  # dès qu'une signature a lieu — aucun réglage supplémentaire nécessaire.
  signtoolOptions:
    signingHashAlgorithms:
      - sha256
portable:
  # Niveau d'exécution le plus bas possible (cohérent avec `nsis.perMachine:
  # false` + `allowElevation: false` ci-dessous — Aether n'a jamais besoin des
  # droits administrateur, qu'il soit installé ou lancé en portable).
  requestExecutionLevel: user
  artifactName: ${productName}-Portable-${version}.${ext}
nsis:
  # Installeur « assisté » (assistant classique : Bienvenue → CGU → Installer →
  # Terminer), PAS le mode « un clic » d'origine qui installait directement
  # sans la moindre interaction. `allowToChangeInstallationDirectory: false` et
  # `allowElevation: false` gardent malgré tout un parcours COURT et PRÉVISIBLE
  # (pas de page « choisir le dossier », pas de page « pour moi / tout le
  # monde ») : l'emplacement d'installation reste TOUJOURS le même — condition
  # nécessaire pour qu'une mise à jour se pose par-dessus l'existant au lieu de
  # créer une installation en double à côté (vécu avec
  # `allowToChangeInstallationDirectory`, qui laissait un dossier différent à
  # chaque installation manuelle).
  oneClick: false
  allowToChangeInstallationDirectory: false
  allowElevation: false
  perMachine: false
  # Page personnalisée « Aether est déjà installé → Réparer/Supprimer » (façon
  # iTunes) — voir build/installer.nsh. Remplace la page de bienvenue standard
  # UNIQUEMENT quand une installation existante est détectée (registre) ; sans
  # ça, relancer l'installeur écrasait silencieusement l'existant sans prévenir.
  include: build/installer.nsh
  license: build/license.txt
  artifactName: ${productName}-Setup-${version}.${ext}
  shortcutName: Aether
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
# Ciblage Linux ajouté (config seule) — NON VÉRIFIÉ : ce dépôt n'a été packagé/
# testé que sur Windows jusqu'ici, `.github/workflows/release.yml` tourne sur
# `windows-latest` et ne construit/publie que la cible Windows ci-dessus (donc
# CETTE section reste inerte tant que le workflow n'est pas aussi étendu à un
# runner Linux — volontairement pas fait dans le même changement, modifier un
# pipeline CI qui fonctionne sans pouvoir vérifier qu'un build Linux réussit
# vraiment aurait été plus risqué que d'ajouter la config seule). Modules
# natifs (better-sqlite3, koffi) à revérifier : leurs binaires prébuilts
# doivent exister pour linux-x64, sans quoi le build échouerait à l'usage réel.
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Network
  icon: build/icon.png
