name: Release

# Publie automatiquement une release GitHub (installeur + manifeste de mise à
# jour) dès que `version` change dans package.json sur main — pas de jeton à
# gérer manuellement : `GITHUB_TOKEN` est fourni gratuitement par GitHub
# Actions pour ce dépôt, avec la permission `contents: write` ci-dessous.
on:
  push:
    branches: [main]
    paths:
      - package.json

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      version: ${{ steps.diff.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - id: diff
        shell: bash
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      # electron-builder uploade plusieurs fichiers EN PARALLÈLE (l'installeur
      # + son blockmap) — si la release n'existe pas encore, chaque upload
      # tente de la créer de son côté : une requête gagne la course, l'autre
      # échoue silencieusement et son fichier n'est jamais envoyé (observé :
      # latest.yml manquant malgré une étape "réussie"). La créer nous-mêmes
      # AVANT élimine la course : electron-builder ne fait plus qu'uploader
      # vers une release déjà existante.
      - name: Créer la release à l'avance (évite la course à la création)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.check-version.outputs.version }}"
          gh release create "$TAG" --draft --title "$TAG" --notes "" --repo titilyonnais/aether-browser || echo "Existe déjà — poursuite normale."
      - run: npx electron-vite build
      # Deux installeurs Windows distincts, DEUX invocations electron-builder
      # séparées (electron-builder ne permet pas deux configs NSIS différentes
      # en un seul appel — `nsis:` est un objet global par nom de cible, pas
      # par entrée de tableau) — voir electron-builder.yml/.updater.yml pour
      # le pourquoi complet. `--publish never` sur LES DEUX : chaque build
      # écrit son propre `latest.yml` (électron-builder le fait pour tout
      # build NSIS non-portable, indépendamment de `oneClick`) — les publier
      # tous les deux ferait gagner celui qui uploade en dernier (course),
      # exactement le genre de fragilité que la création anticipée de la
      # release visait déjà à éliminer. On choisit nous-mêmes, explicitement,
      # quel fichier de chaque build atterrit dans la release.
      - name: Build — installeur assistant (téléchargement manuel)
        run: npx electron-builder --config electron-builder.yml --publish never
      - name: Build — installeur un clic (auto-updater uniquement)
        run: npx electron-builder --config electron-builder.updater.yml --publish never
      # Un seul SHA256SUMS.txt combinant les empreintes des deux builds —
      # sans ça, seul le dernier `gh release upload` déciderait quel fichier
      # de check-sums survit dans la release.
      - name: Combiner les empreintes SHA-256
        shell: bash
        run: cat release/SHA256SUMS.txt release-updater/SHA256SUMS.txt > SHA256SUMS-combined.txt
      - name: Publier les artefacts sur la release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.check-version.outputs.version }}"
          gh release upload "$TAG" --repo titilyonnais/aether-browser --clobber \
            "release/Aether-Setup-${{ needs.check-version.outputs.version }}.exe" \
            "release/Aether-Portable-${{ needs.check-version.outputs.version }}.exe" \
            "release-updater/Aether-Setup-${{ needs.check-version.outputs.version }}-updater.exe" \
            "release-updater/Aether-Setup-${{ needs.check-version.outputs.version }}-updater.exe.blockmap" \
            "release-updater/latest.yml" \
            "SHA256SUMS-combined.txt#SHA256SUMS.txt"
      # electron-builder publie en BROUILLON (releaseType: draft, electron-builder.yml)
      # — étape séparée pour la rendre réellement visible.
      - name: Publier la release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "v${{ needs.check-version.outputs.version }}" --draft=false --repo titilyonnais/aether-browser
